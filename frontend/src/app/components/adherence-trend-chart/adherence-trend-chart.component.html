<div class="adherence-chart-container glassmorphic-card">
  <div class="header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
      <h3 class="d-flex align-items-center gap-2">
        <i class="bi bi-graph-up text-success"></i>
        Historical Trends
      </h3>
      <span class="subtitle">Monthly Adherence Trace</span>
    </div>

    <div class="d-flex align-items-center gap-3">
      <!-- Quick Stat Pill -->
      <div class="stat-pill">
        <span class="stat-label">Avg Adherence</span>
        <span class="stat-value text-success">{{averageAdherence}}%</span>
      </div>

      <!-- Temporal Month Picker -->
      <div class="month-picker-container">
        <label for="monthSelect" class="visually-hidden">Select Month</label>
        <input 
          type="month" 
          id="monthSelect" 
          class="glassmorphic-input" 
          [(ngModel)]="selectedMonthValue" 
          (change)="onMonthChange()">
      </div>
    </div>
  </div>
  
  <div class="chart-wrapper mt-4">
    <ng-container *ngIf="!loaded">
      <div class="d-flex justify-content-center align-items-center h-100 flex-column text-muted">
        <div class="spinner-border text-success mb-3" role="status"></div>
        <p class="chart-placeholder">Loading clinical data...</p>
      </div>
    </ng-container>

    <ng-container *ngIf="loaded && noData">
      <div class="d-flex justify-content-center align-items-center h-100 flex-column text-muted opacity-50">
        <i class="bi bi-calendar-x display-4 mb-3"></i>
        <p class="chart-placeholder">No medication log data found for the selected period.</p>
      </div>
    </ng-container>

    <canvas *ngIf="loaded && !noData"
      baseChart
      [data]="lineChartData"
      [options]="lineChartOptions"
      [type]="lineChartType">
    </canvas>
  </div>
</div>
