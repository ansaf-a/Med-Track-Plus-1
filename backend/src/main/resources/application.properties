server.port=8081
spring.application.name=backend

# Database Connectivity
spring.datasource.url=jdbc:mysql://localhost:3306/med_system
spring.datasource.username=root
spring.datasource.password=${MYSQL_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Application Security
spring.security.user.name=admin
server.port=8081
spring.application.name=backend

# Database Connectivity
spring.datasource.url=jdbc:mysql://localhost:3306/med_system
spring.datasource.username=root
spring.datasource.password=${MYSQL_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Application Security
spring.security.user.name=admin
spring.security.user.password=${APP_ADMIN_PASSWORD}

# JWT Configuration
app.jwtSecret=secret
app.jwtExpirationMs=86400000

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# Multipart File Upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.servlet.multipart.location=uploads/prescriptions
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
